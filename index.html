<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HLL Scanner">
<title>HLL PTW — Scanner</title>

<link rel="manifest" href="./manifest.json">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js" crossorigin="anonymous"></script>
<style>
/* ── Reset & Base ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#0f172a;min-height:100vh;color:#1e293b;
  -webkit-tap-highlight-color:transparent;
}

/* ── Layout & Header ──────────────────────────────────────── */
.page{max-width:520px;margin:0 auto;padding:12px 12px 40px}
.hdr{
  background:rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.1);
  padding:12px 16px;display:flex;align-items:center;gap:12px;
}
.hdr-logo{
  width:36px;height:36px;border-radius:8px;
  background:linear-gradient(135deg,#3b82f6,#1e3a5f);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#fff;flex-shrink:0;
}
.hdr-title{color:#fff;font-size:14px;font-weight:700;line-height:1.3}
.hdr-sub{color:#94a3b8;font-size:11px}
.hdr-back{
  margin-left:auto;background:rgba(255,255,255,.1);border:none;
  color:#fff;padding:6px 12px;border-radius:6px;cursor:pointer;
  font-size:12px;font-weight:600;white-space:nowrap;
}

/* ── Cards & Inputs ───────────────────────────────────────── */
.card{
  background:#fff;border-radius:12px;overflow:hidden;
  margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.card-header{
  background:#1e3a5f;color:#fff;padding:10px 16px;
  font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.step-badge{
  background:rgba(255,255,255,.2);border-radius:50%;
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;
}
.card-body{padding:14px}
.card-back{
  background:rgba(255,255,255,.15);border:none;color:#fff;
  padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px;
}
.err-box{
  display:none;color:#ef4444;font-size:12px;margin-top:6px;
  padding:6px 10px;background:#fef2f2;border-radius:4px;
}
.action-chip{
  padding:6px 14px;border-radius:99px;border:1.5px solid #e2e8f0;
  font-size:12px;font-weight:700;cursor:pointer;background:#fff;
  transition:all .15s;
}
.action-chip.active{background:#0f172a;color:#fff;border-color:#0f172a}
.worker-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border:1.5px solid #e2e8f0;
  border-radius:8px;cursor:pointer;background:#fff;
  transition:border-color .15s;
}
.worker-row:hover{border-color:#3b82f6}
.worker-av{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#fff;
}
.worker-name{font-size:13px;font-weight:700;color:#0f172a}
.worker-meta{font-size:11px;color:#64748b;margin-top:1px}
.acked-badge{
  margin-left:auto;flex-shrink:0;
  font-size:10px;font-weight:700;padding:3px 8px;
  border-radius:99px;background:#dcfce7;color:#14532d;
}
.pending-badge{
  margin-left:auto;flex-shrink:0;font-size:11px;color:#3b82f6;font-weight:700;
}
#qr-reader{
  border-radius:8px;overflow:hidden;
  border:2px solid #e2e8f0;min-height:260px;
  background:#f8fafc;
}
.worker-confirm-card{
  background:#f8fafc;border:1.5px solid #e2e8f0;
  border-radius:8px;padding:14px;margin-bottom:12px;
}
.wcc-name{font-size:17px;font-weight:800;color:#0f172a;margin-bottom:4px}
.wcc-row{font-size:12px;color:#64748b;margin-top:3px}
.wcc-valid{
  display:inline-block;margin-top:6px;padding:3px 10px;
  border-radius:99px;font-size:11px;font-weight:700;
}
.exec-ack-wrap{
  display:none;margin-bottom:12px;
  padding:10px 12px;background:#f0fdf4;
  border:1.5px solid #86efac;border-radius:8px;
}
.exec-ack-label{cursor:pointer;display:flex;align-items:flex-start;gap:8px}
.btn-row{display:flex;gap:8px}
.btn{
  padding:11px 16px;border-radius:8px;font-size:13px;font-weight:700;
  cursor:pointer;border:none;transition:opacity .15s;
}
.btn:active{opacity:.8}
.btn-dark{background:#0f172a;color:#fff;flex:2}
.btn-outline{background:#fff;color:#374151;border:1.5px solid #e2e8f0;flex:1}
.btn-green{background:#10b981;color:#fff}
.btn-full{display:block;width:100%;margin-top:10px}
.btn-muted{
  display:block;width:100%;margin-top:8px;padding:9px;
  background:transparent;border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.5);border-radius:6px;cursor:pointer;font-size:12px;
}
.success-card{
  background:#f0fdf4;border:2px solid #86efac;
  border-radius:12px;padding:24px 16px;text-align:center;
  margin-bottom:10px;
}
.success-icon{font-size:48px;margin-bottom:10px}
.success-title{font-size:16px;font-weight:800;color:#14532d;margin-bottom:4px}
.success-sub{font-size:12px;color:#166534;margin-bottom:14px}
.success-progress{
  font-size:12px;color:#0f172a;font-weight:700;
  background:#e0f2fe;border-radius:6px;padding:6px 12px;margin-bottom:14px;
}
.spinner{
  width:24px;height:24px;border:3px solid #e2e8f0;
  border-top-color:#3b82f6;border-radius:50%;
  animation:spin .7s linear infinite;display:inline-block;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">HLL</div>
  <div>
    <div class="hdr-title">Job Performer Scanner</div>
    <div class="hdr-sub">HLL Lifecare Ltd. — Peroorkada Factory</div>
  </div>
</div>

<div id="mode-pill" style="display:none;text-align:center;padding:5px 0"></div>

<div class="page">
  <div id="daily-mode-banner" style="display:none;background:#1e3a5f;border-radius:10px;padding:10px 14px;margin-bottom:10px;color:#93c5fd;font-size:12px">
    📅 <strong style="color:#fff">Daily Entry Mode</strong> — Scanning acknowledgements
  </div>

  <div id="step1" class="card">
    <div class="card-header">
      <div style="display:flex;align-items:center;gap:8px"><span class="step-badge">1</span>Select Permit</div>
      <button class="card-back" onclick="loadPermitList()" style="font-size:11px;padding:3px 8px">🔄 Refresh</button>
    </div>
    <div class="card-body">
      <div id="permit-list-area">
        <div style="padding:20px;text-align:center">
          <div class="spinner" style="margin:0 auto 10px;width:24px;height:24px;border-width:3px"></div>
          <div style="font-size:12px;color:#64748b">Loading active permits…</div>
        </div>
      </div>
      <div id="err1" class="err-box"></div>
    </div>
  </div>

  <div id="step2" class="card" style="display:none">
    <div class="card-header">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="step-badge">2</span><span id="step2-title">Select Worker</span>
      </div>
      <button class="card-back" onclick="goStep(1)">← Back</button>
    </div>
    <div class="card-body">
      <div id="permit-info" style="padding:8px 0 10px;border-bottom:1px solid #f1f5f9;margin-bottom:10px;font-size:12px;color:#64748b"></div>
      <div style="margin-bottom:10px">
        <div style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Action</div>
        <div id="action-chips" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      </div>
      <div style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">Tap worker to scan their QR</div>
      <div id="worker-list" style="display:flex;flex-direction:column;gap:6px"></div>
    </div>
  </div>

  <div id="step3" class="card" style="display:none">
    <div class="card-header">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="step-badge">3</span><span id="step3-title">Scan Worker QR Code</span>
      </div>
      <button class="card-back" onclick="goStep(2)">← Back</button>
    </div>
    <div class="card-body">
      <div id="current-worker-label" style="padding:8px 12px;background:#eff6ff;border-radius:6px;font-size:12px;font-weight:600;color:#1e40af;margin-bottom:12px"></div>

      <div id="scan-live-wrap" style="display:none">
        <div id="qr-reader" style="border-radius:8px;overflow:hidden;border:2px solid #1e3a5f;min-height:280px;background:#000"></div>
        <p style="font-size:11px;color:#64748b;text-align:center;margin-top:7px">Keep the QR code centred in the frame</p>
      </div>

      <div id="scan-file-wrap" style="display:none">
        <input type="file" id="qr-file-input" accept="image/*" capture="environment" style="display:none" onchange="processQRImage(this)">
        <label for="qr-file-input" style="display:flex;align-items:center;justify-content:center;gap:12px;padding:18px 24px;background:linear-gradient(135deg,#0f172a,#1e3a5f);color:#fff;border-radius:12px;cursor:pointer;font-size:15px;font-weight:700;width:100%;box-sizing:border-box;margin-bottom:12px">
          <span style="font-size:28px">📷</span><span>Open Camera &amp; Scan QR</span>
        </label>
        <div id="qr-preview-wrap" style="display:none;margin-bottom:10px">
          <canvas id="qr-canvas" style="display:none"></canvas>
          <img id="qr-preview-img" alt="Captured" style="max-width:100%;max-height:180px;border-radius:8px;border:1.5px solid #e2e8f0;object-fit:contain;display:block;margin:0 auto 8px">
          <div id="qr-decode-status" style="text-align:center;font-size:13px;font-weight:700;padding:5px"></div>
        </div>
        <div id="qr-err-wrap" style="display:none;margin-bottom:10px">
          <div id="qr-err-msg" style="background:#fef3c7;border:1px solid #fcd34d;border-radius:6px;padding:9px 12px;font-size:12px;color:#92400e;margin-bottom:8px"></div>
          <label for="qr-file-input" style="display:inline-block;padding:8px 18px;background:#0f172a;color:#fff;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700">🔄 Try Again</label>
        </div>
      </div>

      <div style="display:flex;align-items:center;gap:10px;margin:10px 0">
        <div style="flex:1;height:1px;background:#e2e8f0"></div>
        <span style="font-size:11px;color:#94a3b8;white-space:nowrap">or enter manually</span>
        <div style="flex:1;height:1px;background:#e2e8f0"></div>
      </div>
      <div style="display:flex;gap:8px">
        <input id="manual-cert" type="text" placeholder="Type certificate number…" autocomplete="off" spellcheck="false" style="flex:1;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:14px;font-family:inherit;outline:none" onkeydown="if(event.key==='Enter')lookupManual()">
        <button onclick="lookupManual()" style="padding:10px 18px;background:#0f172a;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:700;font-size:14px">→</button>
      </div>
    </div>
  </div>

  <div id="step4" class="card" style="display:none">
    <div class="card-header" style="background:#059669">
      <div style="display:flex;align-items:center;gap:8px"><span class="step-badge">4</span>Confirm & Record</div>
    </div>
    <div class="card-body">
      <div id="worker-confirm-card" class="worker-confirm-card"></div>
      <div id="exec-ack" class="exec-ack-wrap">
        <label class="exec-ack-label">
          <input type="checkbox" id="exec-check" style="width:15px;height:15px;accent-color:#10b981;margin-top:2px;flex-shrink:0">
          <div>
            <div style="font-size:12px;font-weight:700;color:#14532d">Work Execution Team Confirmation *</div>
            <div style="font-size:11px;color:#166534;margin-top:2px;line-height:1.5">Precautions have been explained and understood.</div>
          </div>
        </label>
      </div>
      <div class="btn-row">
        <button class="btn btn-outline" onclick="goStep(3)">← Rescan</button>
        <button class="btn btn-dark" onclick="confirmScan()">✓ Record Sign</button>
      </div>
      <div id="err4" class="err-box"></div>
    </div>
  </div>

  <div id="success-card" class="success-card" style="display:none">
    <div class="success-icon">✅</div>
    <div id="suc-title" class="success-title"></div>
    <div id="suc-sub" class="success-sub"></div>
    <div id="suc-progress" class="success-progress" style="display:none"></div>
    <button class="btn btn-green btn-full" onclick="resetToStep2()">Scan Next Worker →</button>
    <button class="btn btn-muted btn-full" onclick="goStep(1)">Change Permit</button>
  </div>
</div>

<script>
// ── 1. Register Service Worker (Required for "Add to Home Screen") ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(r => console.log('SW registered'))
      .catch(e => console.log('SW failed', e));
  });
}

// ── 2. Config (REPLACE THIS URL) ─────────────────────────────
// ⚠️ PASTE YOUR APPS SCRIPT DEPLOYMENT URL BELOW
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyStRE8Z4FP9E2Vk23FwKj0x_z_h-E7GBjq9zqOmGg81lzjqNO7-ZO5Y0JsJwsf17qh/exec';

// Parse URL params properly
const urlParams = new URLSearchParams(window.location.search);
const INIT_PERMIT_NO  = (urlParams.get('permitNo') || '').trim();
const INIT_ENTRY_ID   = (urlParams.get('entryId') || '').trim();

// ── 3. App State ─────────────────────────────────────────────
let _permit      = null;    
let _workerRec   = null;    
let _targetWorker= null;    
let _action      = 'Acknowledgement';
let _isDailyMode = !!INIT_ENTRY_ID; 

// ── 4. API Core ──────────────────────────────────────────────
async function api(action, payload) {
  const body = JSON.stringify({ action, payload: payload || {} });
  const r    = await fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body
  });
  if (!r.ok) throw new Error('Server error ' + r.status);
  const d = await r.json();
  if (!d.ok) throw new Error(d.error || 'Unknown server error');
  return d.result; // Using d.result as fixed previously
}

// ── 5. Logic Helpers ─────────────────────────────────────────
function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;') : ''; }
function showErr(id, msg) { const el = document.getElementById(id); if (el) { el.textContent = msg; el.style.display = 'block'; } }
function hideErr(id) { const el = document.getElementById(id); if (el) el.style.display = 'none'; }
function setLoading(cardId, loading) { const card = document.getElementById(cardId); if (card) card.style.opacity = loading ? '0.6' : '1'; }

function goStep(n) {
  [1,2,3,4].forEach(i => { const el = document.getElementById('step'+i); if (el) el.style.display = i===n ? '' : 'none'; });
  document.getElementById('success-card').style.display = 'none';
  if (n === 3) startCamera(); else stopCamera();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function loadPermitList() {
  const area = document.getElementById('permit-list-area');
  hideErr('err1');
  area.innerHTML = '<div style="padding:20px;text-align:center"><div class="spinner" style="margin:0 auto 10px"></div><div style="font-size:12px;color:#64748b">Loading active permits…</div></div>';
  try {
    const permits = await api('getActivePermitsForScanner', {});
    if (!permits || !permits.length) {
      area.innerHTML = '<div style="padding:20px;text-align:center;color:#64748b;font-size:13px">No active permits found.</div>';
      return;
    }
    const statusColor = { 'Active': {bg:'#dcfce7', co:'#14532d'}, 'Pending Worker Acknowledgement':{bg:'#fef3c7', co:'#92400e'} };
    area.innerHTML = permits.map(p => {
      const sc = statusColor[p.status] || {bg:'#f1f5f9', co:'#374151'};
      return `<div onclick='selectPermit(${JSON.stringify(p).replace(/'/g,"&#39;")})' style="display:flex;align-items:center;gap:12px;padding:11px 12px;border:1.5px solid #e2e8f0;border-radius:8px;margin-bottom:8px;cursor:pointer;background:#fff">
        <div style="flex:1"><div style="font-size:14px;font-weight:800;color:#0f172a">${p.permitNo}</div><div style="font-size:12px;color:#475569">${p.type} · ${p.jobDescription}</div></div>
        <div style="text-align:right"><span style="display:inline-block;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:700;background:${sc.bg};color:${sc.co}">${p.status}</span></div>
      </div>`;
    }).join('');
  } catch(e) {
    area.innerHTML = '';
    showErr('err1', 'Error loading permits: ' + e.message);
  }
}

function selectPermit(p) {
  _permit = p;
  api('getPermitByNo', { permitNo: p.permitNo }).then(full => { if (full) _permit = full; renderStep2(); goStep(2); }).catch(() => { renderStep2(); goStep(2); });
}

function renderStep2() {
  if (!_permit) return;
  const p = _permit, ex = p.extras || {};
  document.getElementById('daily-mode-banner').style.display = _isDailyMode ? 'block' : 'none';
  document.getElementById('permit-info').innerHTML = `<strong style="color:#0f172a">${esc(p.permitNo)}</strong> · ${esc(p.type)} · ${esc(p.jobDescription)}<br><span style="color:#94a3b8">${esc(p.workArea)} · ${esc(p.status)}</span>`;
  document.getElementById('step2-title').textContent = _isDailyMode ? 'Daily Entry — Worker Ack' : 'Select Action & Worker';

  let actions = _isDailyMode ? [{id:'Acknowledgement', label:'✍ Worker Ack'}] : [{id:'Acknowledgement', label:'✍ Ack'}];
  if (!_isDailyMode && p.jobStartTime && !p.jobStopTime) actions.push({id:'Stop', label:'⏹ Stop'});
  if (!_isDailyMode && !p.jobStartTime) actions.push({id:'Start', label:'▶ Start'});
  
  _action = actions[0].id;
  document.getElementById('action-chips').innerHTML = actions.map(a => `<button class="action-chip${a.id===_action?' active':''}" onclick="setAction('${a.id}',this)">${a.label}</button>`).join('');
  renderWorkerList();
}

function setAction(id, btn) {
  _action = id;
  document.querySelectorAll('.action-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderWorkerList();
}

function renderWorkerList() {
  const el = document.getElementById('worker-list');
  const ex = _permit.extras || {};
  let workers = [];
  if (_isDailyMode) {
    const entry = (ex.dailyEntries||[]).find(e => e.entryId === INIT_ENTRY_ID);
    workers = entry ? entry.workers : [];
  } else {
    workers = (ex.workEntries||[]).flatMap(e => e.workers||[]);
    if (!workers.length) workers = ex.workers || [];
  }

  if (!workers.length) { el.innerHTML = '<div style="text-align:center;color:#64748b;font-size:12px;padding:10px">No workers found.</div>'; return; }

  el.innerHTML = workers.map((w, idx) => {
    const acked = _isDailyMode ? w.acked : (ex.ackedWorkers||[]).includes(w.certNo||w.idNo||w.name);
    return `<div class="worker-row" onclick="selectWorker(${idx})">
      <div class="worker-av" style="background:#3b82f6">${(w.name||'?')[0].toUpperCase()}</div>
      <div style="flex:1"><div class="worker-name">${esc(w.name)}</div><div class="worker-meta">${esc(w.certNo||'—')}</div></div>
      ${acked ? `<span class="acked-badge">✓ Acked</span>` : `<span class="pending-badge">Tap to scan →</span>`}
    </div>`;
  }).join('');
  el._workers = workers;
}

function selectWorker(idx) {
  _targetWorker = document.getElementById('worker-list')._workers[idx];
  document.getElementById('current-worker-label').innerHTML = `Scanning for: <strong>${esc(_targetWorker.name)}</strong>`;
  goStep(3);
}

// ── 6. Camera / Scanner ──────────────────────────────────────
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
let _qrScanner = null;

function startCamera() {
  if (isStandalone) {
    document.getElementById('scan-live-wrap').style.display = 'block';
    document.getElementById('scan-file-wrap').style.display = 'none';
    if (typeof Html5Qrcode !== 'undefined') {
      try {
        _qrScanner = new Html5Qrcode('qr-reader');
        _qrScanner.start(
          { facingMode: 'environment' }, 
          { fps: 10, qrbox: 250 }, 
          certNo => { 
            stopCamera(); 
            // FIX: Force clean the scanned text here
            onScanned(certNo.trim().toLowerCase()); 
          }, 
          () => {}
        );
      } catch(e) { console.warn(e); }
    }
  } else {
    document.getElementById('scan-live-wrap').style.display = 'none';
    document.getElementById('scan-file-wrap').style.display = 'block';
  }
}

function stopCamera() {
  if (_qrScanner) { try { _qrScanner.stop(); } catch(e){} _qrScanner = null; }
  document.getElementById('qr-reader').innerHTML = '';
}

function processQRImage(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  document.getElementById('qr-preview-wrap').style.display = 'block';
  document.getElementById('qr-decode-status').textContent = 'Reading QR code…';
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      document.getElementById('qr-preview-img').src = e.target.result;
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);
      const code = typeof jsQR === 'function' ? jsQR(ctx.getImageData(0,0,canvas.width,canvas.height).data, canvas.width, canvas.height, { inversionAttempts: 'dontInvert' }) : null;
      if (code && code.data) { input.value = ''; onScanned(code.data.trim().toLowerCase()); } 
      else { document.getElementById('qr-err-wrap').style.display = 'block'; input.value = ''; }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function lookupManual() {
  const certNo = document.getElementById('manual-cert').value.trim();
  if (certNo) onScanned(certNo);
}

// ── 7. Scanned Data Flow ─────────────────────────────────────
async function onScanned(certNo) {
  stopCamera();
  
  // ── JSON EXTRACTION FIX ─────────────────────────────────────
  let finalCert = certNo.trim();
  
  try {
    // Check if the scanned string is actually a JSON object
    if (finalCert.startsWith('{') && finalCert.endsWith('}')) {
      const parsedData = JSON.parse(finalCert);
      if (parsedData && parsedData.id) {
        finalCert = parsedData.id.trim(); // Extract just the ID field
      }
    }
  } catch(jsonErr) {
    // If it's not valid JSON, treat it as a plain text card string
    console.log("Plain text card detected, skipping JSON parse");
  }
  
  // Force clean the extracted result string for lookup safety
  finalCert = finalCert.toLowerCase();
  // ────────────────────────────────────────────────────────────

  const el = document.getElementById('qr-reader');
  if (el) el.innerHTML = `<div style="padding:20px;text-align:center"><div class="spinner"></div><div style="margin-top:8px;font-size:12px;color:#64748b">Looking up ${esc(finalCert)}…</div></div>`;

  try {
    // Send the extracted, clean ID string to the backend API
    const rec = await api('getInductionByCert', { certNo: finalCert });
    if (!rec) throw new Error('Worker not found in induction database');
    _workerRec = rec;
    document.getElementById('worker-confirm-card').innerHTML = `<div class="wcc-name">${esc(rec.name)}</div><div class="wcc-row">🪪 Cert No: <strong>${esc(rec.certNo)}</strong></div>`;
    document.getElementById('exec-ack').style.display = _action === 'Start' ? 'block' : 'none';
    goStep(4);
  } catch(e) {
    alert(e.message);
    startCamera();
  }
}

async function confirmScan() {
  if (_action === 'Start' && !document.getElementById('exec-check').checked) { alert('Please confirm Execution Team briefing.'); return; }
  try {
    setLoading('step4', true);
    let res;
    if (_isDailyMode) res = await api('ackDailyWorker', { permitNo:_permit.permitNo, entryId:INIT_ENTRY_ID, certNo:_workerRec.certNo, workerName:_workerRec.name });
    else if (_action === 'Acknowledgement') res = await api('recordWorkerAck', { permitNo:_permit.permitNo, certNo:_workerRec.certNo, workerName:_workerRec.name });
    else res = await api('jobPerformerSign', { permitNo:_permit.permitNo, action:_action.toLowerCase(), certNo:_workerRec.certNo, workerName:_workerRec.name });
    
    setLoading('step4', false);
    
    // Show success
    [1,2,3,4].forEach(i => document.getElementById('step'+i).style.display='none');
    document.getElementById('success-card').style.display = '';
    document.getElementById('suc-title').textContent = _action + ' Successful ✓';
  } catch(e) {
    setLoading('step4', false);
    showErr('err4', e.message);
  }
}

function resetToStep2() { _workerRec = null; _targetWorker = null; goStep(2); }

// ── 8. Init ──────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const pill = document.getElementById('mode-pill');
  pill.style.display = 'block';
  pill.innerHTML = isStandalone 
    ? '<span style="background:#dcfce7;color:#14532d;padding:3px 12px;border-radius:99px;font-size:11px;font-weight:700">🟢 App Mode — Live scanning active</span>' 
    : '<span style="background:#f1f5f9;color:#475569;padding:3px 12px;border-radius:99px;font-size:11px">📷 Browser Mode — Install app to home screen for live scanning</span>';
  
  if (INIT_PERMIT_NO) api('getPermitByNo', { permitNo: INIT_PERMIT_NO }).then(p => { if(p)selectPermit(p); else loadPermitList(); });
  else loadPermitList();
});
</script>
